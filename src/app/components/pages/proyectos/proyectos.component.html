<div class="proyectos">
    <div class="contenido">
        <div class="titulo-contenedor">
            <img src="images/Yo/Yo_proyectos.webp" alt="" class="titulo-icono" />
            <h2 class="titulo">{{ 'proyectos.titulo' | translate }}</h2>
        </div>

        <!-- Grid de tarjetas -->
        <div class="grid">
            <div class="tarjeta" *ngFor="let proyecto of proyectos; let i = index">

                <!-- Imagen de portada (solo si existe) -->
                <div class="tarjeta-imagen" *ngIf="proyecto.imagen">
                    <img [src]="proyecto.imagen" [alt]="proyecto.nombre | translate" />
                </div>

                <!-- Nombre -->
                <h3 class="proyecto-nombre">{{ proyecto.nombre | translate }}</h3>

                <!-- Botón descripción -->
                <button class="btn-descripcion" (click)="toggleDescripcion(i)">
                    <span>{{ 'proyectos.btnDescripcion' | translate }}</span>
                    <span>{{ descripcionesExpandidas[i] ? '▲' : '▼' }}</span>
                </button>

                <!-- Contenido expandible -->
                <div class="descripcion-contenido" *ngIf="descripcionesExpandidas[i]">
                    <p class="proyecto-descripcion">{{ proyecto.descripcion | translate }}</p>
                </div>
                
                <!-- Iconos de tecnologías -->
                <app-tech-icons [tecnologias]="proyecto.tecnologias"></app-tech-icons>

                <!-- Botones de enlaces -->
                <div class="enlaces">
                    <a *ngIf="proyecto.urlGithub" [href]="proyecto.urlGithub" target="_blank" class="btn btn-github">{{ 'proyectos.btnGithub' | translate }}</a>

                    <!-- Si tiene galería muestra botón expandible, si no muestra demo normal -->
                    <ng-container *ngIf="proyecto.galeria && proyecto.galeria.length > 0; else demoNormal">
                        <button class="btn btn-demo btn-galeria" (click)="toggleGaleria(i)">
                            <span>{{ 'proyectos.btnGaleria' | translate }}</span>
                            <span>{{ galeriasExpandidas[i] ? '▲' : '▼' }}</span>
                        </button>
                    </ng-container>
                    
                    <ng-template #demoNormal>
                        <a [href]="proyecto.urlDemo || '#'" [class.disabled]="!proyecto.urlDemo" [attr.target]="proyecto.urlDemo ? '_blank' : null" class="btn btn-demo">
                            {{ 'proyectos.btnDemo' | translate }}
                        </a>
                    </ng-template>
                </div>

                <!-- Galería expandible -->
                <div class="galeria" *ngIf="proyecto.galeria && galeriasExpandidas[i]">
                    <img *ngFor="let img of proyecto.galeria" [src]="img.url" class="galeria-imagen" (click)="abrirImagen(img.url, img.descripcion)" alt="{{ proyecto.galeria ? '' : 'Imagen del proyecto'}}"/>
                </div>
            </div>

            <!-- Modal para ver imagen en grande -->
            <div class="imagen-overlay" *ngIf="imagenAbierta" (click)="cerrarImagen()">
                <img [src]="imagenAbierta" alt="Imagen ampliada" class="imagen-grande" />
                <p class="imagen-descripcion" *ngIf="imagenDescripcion">{{ imagenDescripcion }}</p>
            </div>
        </div>
    </div>
</div>
