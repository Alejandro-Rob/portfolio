<div class="proyectos">
    <div class="contenido">
        <h2 class="titulo">{{ 'proyectos.titulo' | translate }}</h2>

        <!-- Grid de tarjetas -->
        <div class="grid">
            <div class="tarjeta" *ngFor="let proyecto of proyectos">

                <!-- Nombre y descripción -->
                <h3 class="proyecto-nombre">{{ proyecto.nombre | translate }}</h3>

                <!-- Imagen superior (solo si existe) -->
                <div class="tarjeta-imagen" *ngIf="proyecto.imagen">
                    <img [src]="proyecto.imagen" [alt]="proyecto.nombre" />
                </div>

                <p [innerHTML]="proyecto.descripcion | translate" class="proyecto-descripcion"></p>

                <!-- Píldoras de tecnologías -->
                <app-tech-icons [tecnologias]="proyecto.tecnologias"></app-tech-icons>

                <!-- Botones de enlaces (solo si existen) -->
                <div class="enlaces">
                    <a *ngIf="proyecto.urlGithub" [href]="proyecto.urlGithub" target="_blank" class="btn btn-github">
                        GitHub
                    </a>
                    <a *ngIf="proyecto.urlDemo" [href]="proyecto.urlDemo" target="_blank" class="btn btn-demo">
                        {{ 'proyectos.btnDemo' | translate }}
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
