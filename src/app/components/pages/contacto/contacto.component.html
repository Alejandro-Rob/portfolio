<div class="contacto">
    <div class="contenido">
        <div class="titulo-contenedor">
            <img src="images/Yo/Yo_Contacto.webp" alt="" class="titulo-icono" />
            <h2 class="titulo">{{ 'contacto.titulo' | translate }}</h2>
        </div>
        
        <p class="subtitulo">{{ 'contacto.subtitulo' | translate }}</p>

        <div class="tarjetas">

            <a href="tel:+34695581816" class="tarjeta">
                <i class="fa-solid fa-phone icono"></i>
                <div class="info">
                    <span class="etiqueta">{{ 'contacto.telefono' | translate }}</span>
                    <span class="valor">+34 695 58 18 16</span>
                </div>
            </a>

            <a href="mailto:tuemail@gmail.com" class="tarjeta">
                <i class="fa-solid fa-envelope icono"></i>
                <div class="info">
                    <span class="etiqueta">{{ 'contacto.email' | translate }}</span>
                    <span class="valor">proalob&commat;gmail.com</span>
                </div>
            </a>

            <a href="https://www.linkedin.com/in/alejandro-rob/" target="_blank" class="tarjeta">
                <i class="fa-brands fa-linkedin icono"></i>
                <div class="info">
                    <span class="etiqueta">LinkedIn</span>
                    <span class="valor">Alejandro-r</span>
                </div>

            <div class="tarjeta no-link">
                <i class="fa-solid fa-location-dot icono"></i>
                <div class="info">
                    <span class="etiqueta">{{ 'contacto.ubicacion' | translate }}</span>
                    <span class="valor">{{ 'contacto.zona' | translate }}</span>
                </div>
            </div>
