<div class="hero">
    <div class="hero-contenido">
        <div class="foto-contenedor">
            <img src="images/Yo/Yo.webp" alt="Foto de perfil" class="foto" />
        </div>
        <div class="">
            <p class="hero-saludo">{{ 'hero.saludo' | translate }}</p>
            <h1 class="hero-nombre">Alejandro</h1>
            <p class="hero-rol">{{ 'hero.rol' | translate }}</p>
            <p class="hero-descripcion">{{ 'hero.descripcion' | translate }}</p>
            <div class="hero-botones">
                <a href="CV-VJ-Alejandro_Robles_Alcalde.pdf" download="CV-Alejandro_Robles.pdf" class="btn btn-primario">
                    {{ 'hero.btnCv' | translate }}
                </a>
                <button (click)="scrollTo('contacto')" class="btn btn-secundario">
                    {{ 'hero.btnContacto' | translate }}
                </button>
            </div>
        </div>
    </div>
</div>
