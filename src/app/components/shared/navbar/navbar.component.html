<nav class="navbar">
    <div class="navbar-logo">Portfolio Alejandro</div>

    <button class="hamburger" (click)="toggleMenu()">☰</button>

    <ul class="navbar-links" [class.abierto]="menuAbierto">
        <li><button (click)="scrollTo('inicio')">{{ 'navbar.inicio' | translate }}</button></li>
        <li><button (click)="scrollTo('sobre-mi')">{{ 'navbar.sobreMi' | translate }}</button></li>
        <li><button (click)="scrollTo('tecnologias')">{{ 'navbar.tecnologias' | translate }}</button></li>
        <li><button (click)="scrollTo('experiencia')">{{ 'navbar.experiencia' | translate }}</button></li>
        <li><button (click)="scrollTo('estudios')">{{ 'navbar.estudios' | translate }}</button></li>
        <li><button (click)="scrollTo('proyectos')">{{ 'navbar.proyectos' | translate }}</button></li>
        <li><button (click)="scrollTo('contacto')">{{ 'navbar.contacto' | translate }}</button></li>

        <!-- Selector de idioma desplegable -->
        <li class="selector-idioma">
            <button class="btn-idioma activo" (click)="toggleDesplegable()">
                {{ etiquetaActual }} ▾
            </button>

            <!-- Opciones desplegables -->
            <ul class="desplegable" *ngIf="desplegableAbierto">
                <li *ngFor="let idioma of idiomas">
                    <button
                        [class.activo]="idiomaActual === idioma.codigo"
                        (click)="cambiarIdioma(idioma.codigo)">
                        {{ idioma.etiqueta }}
                    </button>
                </li>
            </ul>
        </li>
    </ul>
</nav>
